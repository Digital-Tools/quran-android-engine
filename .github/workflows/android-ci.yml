name: Android CI

on:
  # Automatic triggers disabled — CI does not yet account for the Flutter
  # composite-build setup (mizan-app includes this repo as an includeBuild).
  # Re-enable push/pull_request once the standalone build is wired for CI.
  # Also bump java-version to 21 when re-enabling (toolchain was bumped from 17→21).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build and unit test
        run: ./gradlew --no-daemon :app:assembleDebug :app:testDebugUnitTest
